<!DOCTYPE html>
<html>
<head>
  <title>Choose Exam</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 50px;
    }

    h2 {
      margin-bottom: 30px;
    }

    select, input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 15px 30px;
      margin-top: 20px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: white;
    }
  </style>
</head>

<body>

<h2>🎯 Customize Your Exam</h2>

<form action="/start_exam" method="POST">

  <!-- Question Type -->
  <h3>📘 Select Question Type</h3>
  <select name="type">
    <option value="MCQ">Only MCQ</option>
    <option value="DESCRIPTIVE">Only Descriptive</option>
    <option value="MIX">MCQ + Descriptive</option>
  </select>

  <!-- Difficulty -->
  <h3>📊 Select Difficulty</h3>
  <select name="level">
    <option value="ALL">All</option>
    <option value="Easy">Easy</option>
    <option value="Medium">Medium</option>
    <option value="Hard">Hard</option>
  </select>

  <!-- Number of Questions -->
  <h3>🔢 Number of Questions</h3>
  <input type="number" name="count" min="1" max="50" value="5">

  <br>
  <button type="submit">🚀 Start Exam</button>

</form>

</body>
</html>
